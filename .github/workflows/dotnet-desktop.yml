# 此工作流使用未经 GitHub 认证的操作。
# 它们由第三方提供，并受单独的服务条款、隐私政策和支持文档管辖。

# 此工作流将构建基于 .NET Framework 4.8 的控制台应用程序
# 该工作流为 ConsoleBaseTool 项目配置，用于自动化构建过程
#
# 要配置此工作流：
#
# 1. 配置环境变量
# GitHub 为每个工作流运行设置默认环境变量。
# 确保下面的 "env" 部分包含正确的解决方案名称和项目信息。
#
# 有关 GitHub Actions 的更多信息，请参阅 https://github.com/features/actions

name: .NET Framework Console Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    strategy:
      matrix:
        configuration: [Debug, Release]

    runs-on: windows-latest  # 有关可用运行器类型的列表，请参阅
                             # https://help.github.com/en/actions/reference/workflow-syntax-for-github-actions#jobsjob_idruns-on

    env:
      Solution_Name: ConsoleBaseTool.sln              # 解决方案名称
      Project_Name: ConsoleBaseTool                   # 项目名称
      Output_Directory: bin                           # 输出目录

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 将 MSBuild 添加到 PATH：https://github.com/microsoft/setup-msbuild
    - name: 设置 MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    # 还原项目依赖
    - name: 还原项目
      run: msbuild $env:Solution_Name /t:Restore /p:Configuration=$env:Configuration
      env:
        Configuration: ${{ matrix.configuration }}

    # 构建解决方案
    - name: 构建解决方案
      run: msbuild $env:Solution_Name /p:Configuration=$env:Configuration /p:Platform="Any CPU"
      env:
        Configuration: ${{ matrix.configuration }}

    # 上传构建产物
    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: ConsoleBaseTool-${{ matrix.configuration }}
        path: ${{ env.Project_Name }}\${{ env.Output_Directory }}\${{ matrix.configuration }}\
